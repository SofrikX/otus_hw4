[build]
  command = "flutter build web --release --dart-define=USE_SUPABASE_BACKEND=true --dart-define=SUPABASE_URL=$SUPABASE_URL --dart-define=SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY --dart-define=ANALYTICS_ENABLED=$ANALYTICS_ENABLED --dart-define=ANALYTICS_PROVIDER=$ANALYTICS_PROVIDER --dart-define=ANALYTICS_ID=$ANALYTICS_ID"
  publish = "build/web"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY,ANALYTICS_ID"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
